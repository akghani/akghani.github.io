<!-- _assets/title-block.html -->
<header id="title-block-header" style="position: relative;">
  <!-- Particles container -->
  <div id="particles-js" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;"></div>

  <!-- Title Block Content -->
  <div class="title-block-content" style="position: relative; z-index: 1; text-align: center; padding: 2em;">
    <img src="images/logo-akg.png" alt="Logo" style="width:80px; height:80px; margin-bottom:20px;">
    $if(title)$<h1 class="title">$title$</h1>$endif$
    $if(subtitle)$<p class="subtitle">$subtitle$</p>$endif$
  </div>

  <!-- Load particles.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>

  <!-- Initialize particles.js with embedded configuration -->
  <script>
    document.addEventListener("DOMContentLoaded", function(){
      particlesJS("particles-js", {
        "particles": {
          "number": {
            "value": 200,
            "density": {
              "enable": true,
              "value_area": 800
            }
          },
          "color": {
            "value": "#888888"
          },
          "shape": {
            "type": "circle"
          },
          "opacity": {
            "value": 0.5,
            "random": true
          },
          "size": {
            "value": 4,
            "random": true
          },
          "line_linked": {
            "enable": false
          },
          "move": {
            "enable": true,
            "speed": 2,
            "direction": "bottom",
            "random": false,
            "straight": false,
            "out_mode": "out"
          }
        },
        "interactivity": {
          "detect_on": "canvas",
          "events": {
            "onhover": { "enable": false },
            "onclick": { "enable": false },
            "resize": true
          }
        },
        "retina_detect": true
      });
    });
  </script>

  <!-- Ensure the particles canvas fills the container -->
  <style>
    #particles-js canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
  </style>
</header>
