# options specified here will apply to all posts in this folder

# freeze computational output
# (see https://quarto.org/docs/projects/code-execution.html#freeze)
freeze: auto

# Enable banner style title blocks

# include CSS style for title blocks
title-block-banner: "#00000000"
title-block-banner-color: "rgba(255, 255, 255, 0.9)"
include-in-header:
  - text: |
      <style>
      #title-block-header.quarto-title-block.default .quarto-title-meta {
        color: rgba(255, 255, 255, 0.9);
      }
      .quarto-title-block .quarto-title-banner {
        height: 0; /* hide */
      }
      #title-block-header {
        background: 
          /* top, transparent black, faked with gradient */
          linear-gradient(
            rgba(0, 0, 0, 0.7),
            rgba(0, 0, 0, 0.7)
          ),
          /* bottom, image */ 
          url(./images/block-banner.gif);
        background-size: cover;
        background-position-y: center;
        height: 450px;
        opacity: 0.7; /* image opacity, lower means lighter */
        z-index: -1;
      }
      </style>

# Enable CC licence appendix
#license: "CC BY"

# Default fields for citation
#citation: true

# Default author:
author:
  - name: Abdelkarim el Ghani

# Default for table of contents
toc: true
toc-title: Contents
toc-location: left

# Options for outputs
fig-format: svg
fig-align: "center"
out-width: "100%"

# Links
link-external-icon: false # due problem/issue with code-link: true
link-external-newwindow: true

# Default knitr options
execute:
  echo: true
  message: false
  warning: false
  freeze: true  # never re-render during project render



