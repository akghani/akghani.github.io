# Quarto Website Configuration

project:
  type: website
  output-dir: docs

preview:
  port: 22222
  browser: true
  watch-inputs: true
  navigate: true

# Enable Markdown extensions
from: markdown+emoji



website:
  title: "Abdelkarim el Ghani"
  favicon: images/favicon-akg.png  # Favicon image
  image: images/logo-akg.jpg
  open-graph: true  # Enable Open Graph metadata
  search:
    location: navbar
    type: overlay  # Search type
  page-navigation: true  # Enable navigation links on pages
  back-to-top-navigation: true  # Show back-to-top button

  navbar:
    title: Abdelkarim el Ghani
    pinned: true
    logo: images/block-banner.gif  # Navbar logo
    left:
      - text: Home
        href: index.qmd
        icon: house-fill
      - text: About Me
        href: about.qmd
        icon: person-arms-up
      - text: Projects
        href: projects.qmd  # Projects page
        icon: graph-up

    right: 
      - icon: linkedin
        href: https://linkedin.com
        target: _blank
      - icon: github
        href: https://github.com
        target: _blank

  page-footer:
    left: |
      Copyright © 2025 Abdelkarim el Ghani
    center: |
      [![](https://img.shields.io/badge/License-CC%20BY--ND%204.0-lightgrey.svg)](https://creativecommons.org/licenses/by-nd/4.0/)
    right: |
      Build with [![Quarto](https://quarto.org/quarto.png){fig-alt="Quarto logo blue round circle with a cross within the circumference" width=65px}](https://quarto.org/){target="_blank"}
    border: false

#  reader-mode: true  # Enable reader mode

format:
  html:
    fontsize: 20px  # Set font size
    theme: cosmo
    css: theme.scss  # Link custom CSS
    toc: false  # Disable table of contents
    highlight-style: github
    page-layout: full

execute:
  cache: false  # Disable cache
  freeze: auto  # Freeze execution when no changes detected

editor:
  render-on-save: true  # Automatically render on save
