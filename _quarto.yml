project:
  type: website
  output-dir: docs

# Allows the displaying of emojis
from: markdown+emoji

# Allows the readers to click on images to expand them 
lightbox: true

# Open the link in another browser tab
link-external-newwindow: true

website:
  #title: "Abdelkarim el Ghani"
  open-graph: true
  cookie-consent:
    type: express
    style: interstitial
    palette: light
  search: 
    location: navbar
    type: overlay
  back-to-top-navigation: true
  
  sidebar:
    logo: profile_pic_akg.jpg
    alignment: center
    search: true
    pinned: true
    tools:
      - icon: github
        href: https://github.com/AKG3490  # GitHub link
        #target: _blank
      - icon: linkedin
        href: https://linkedin.com/in/abdelkarimelghani  # LinkedIn link
        #target: _blank
    style: docked
    collapse-level: 2
    contents:
      - text: Home
        href: index.qmd
        icon: house-fill
      - text: About Me
        href: about.qmd
        icon: person-arms-up
      - text: Projects
        href: projects.qmd  # Projects page (projects.qmd)
        icon: graph-up
    

  page-footer: 
    left: |
      Copyright © 2025 Abdelkarim el Ghani
    center: | 
      [![](https://img.shields.io/badge/License-CC%20BY--ND%204.0-lightgrey.svg)](https://creativecommons.org/licenses/by-nd/4.0/)
    right: |
      Build with [Quarto](https://quarto.org/)
    border: false
    
  # Add a reader mode button
  reader-mode: true
  
format:
  html:
    fontsize: 20px
    theme: 
      light: flatly
      dark: darkly
    css: styles.css
    toc: true
    highlight-style: nord
#    grid:
#      sidebar-width: 250px
#      body-width: 900px
#      margin-width: 300px
  #pdf: 
  #  documentclass: scrreprt

execute:
  cache: false
  freeze: auto
  
editor: 
  render-on-save: true



