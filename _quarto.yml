project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "*/*.qmd"
    - "*/*/*.qmd"
  resources:
#    - "_assets/**"
    - "images/**"
  preview:
    port: 22227
    browser: true
    watch-inputs: true
    navigate: true

# Metadata stuff
#pagetitle: "{{< meta title >}} | Abdelkarim el Ghani"
#author-meta: "Abdelkarim el Ghani"

website:
  title: "Abdelkarim el Ghani"
  favicon: "images/favicon-akg.png"
  twitter-card: true
  image: images/logo-akg.png
  page-footer:
    background: "#FF6F61"
    left: |
      © 2025 Abdelkarim el Ghani
    center: |
      [![](https://img.shields.io/badge/License-CC%20BY--ND%204.0-lightgrey.svg)](https://creativecommons.org/licenses/by-nd/4.0/)
    right: |
      <span class="faux-block">Build with {{< fa brands r-project >}} and [![Quarto](https://quarto.org/quarto.png){fig-alt="Quarto logo" width=65px}](https://quarto.org/){target="_blank"}</span>
    border: true
    

 ### Navigation ###
  back-to-top-navigation: true
  page-navigation: true
  bread-crumbs: true 
  
open-graph: true



### Navbar ###
navbar:
  pinned: true
  logo: "images/logo-akg-bw.png"
  left:
    - text: "Home"
      href: index.qmd
      icon: house-fill
    - text: "About"
      href: about/index.qmd
      icon: person-arms-up
    - text: "Projects"
      href: projects/index.qmd
      icon: graph-up
    - text: "Resume"
      href: resume.qmd
      icon: file-earmark-text-fill
#    - text: "Resources"
#      href: resources.qmd
      
  
 

## Format options ##

format: 
  html:
    smooth-scroll: true
    theme: [lumen, theme.scss]



## Execution / R options ##
      
execute:
  echo: false
  message: false
  freeze: auto
