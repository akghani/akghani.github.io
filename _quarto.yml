project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
  resources:
    - "_assets/**"
    - "images/**"
  preview:
    port: 22227
    browser: true
    watch-inputs: true
    navigate: true

website:
  title: "Abdelkarim el Ghani"
  favicon: "images/favicon-akg.png"
  image: images/logo-akg.png
  
navbar:
  left:
    - text: "Home"
      href: index.qmd
      icon: house-fill
    - text: "About"
      href: index.qmd#about
      icon: person-arms-up
    - text: "Projects"
      href: projects.qmd
      icon: graph-up
    - text: "Resume"
      href: resume.qmd
      icon: file-earmark-text-fill
    - text: "Resources"
      href: resources.qmd
      
  page-footer:
    background: light
    left: |
      © 2025 Abdelkarim el Ghani
    center: |
      [![](https://img.shields.io/badge/License-CC%20BY--ND%204.0-lightgrey.svg)](https://creativecommons.org/licenses/by-nd/4.0/)
    right: |
      <span class="faux-block">Build with {{< fa brands r-project >}} and [![Quarto](https://quarto.org/quarto.png){fig-alt="Quarto logo" width=65px}](https://quarto.org/){target="_blank"}</span>
    border: true
    
format: 
  html:
    smooth-scroll: true
    theme: 
      - simplex
      - theme.scss
      
execute:
  echo: false
  message: false
