project:
  type: website
  output-dir: docs
  preview: 
    port: 22222
    browser: true
    watch-inputs: true
    navigate: true

# Allows the displaying of emojis
from: markdown+emoji

# Allows the readers to click on images to expand them 
lightbox: true

# Open the link in another browser tab
link-external-newwindow: true

website:
  #title: "Abdelkarim el Ghani"
  favicon: images/favicon-akg.jpg
  open-graph: true
  search: 
    location: navbar
    type: overlay
  page-navigation: true  
  back-to-top-navigation: true
  
  navbar: 
    pinned: true
    left: 
      - text: Home
        href: index.qmd
        icon: house-fill
    right:    
      - text: About Me
        href: about.qmd
        icon: person-arms-up
      - text: Projects
        href: projects.qmd  # Projects page (projects.qmd)
        icon: graph-up
    logo: images/block-banner.gif
  sidebar:
    logo: images/profile_pic_akg.jpg
    alignment: center
    pinned: true
    tools:
      - icon: github
        href: https://github.com/AKG3490  # GitHub link
        #target: _blank
      - icon: linkedin
        href: https://linkedin.com/in/abdelkarimelghani  # LinkedIn link
        #target: _blank
    style: docked
#    collapse-level: 2
#    contents:
      
  

  page-footer: 
    left: |
      Copyright © 2025 Abdelkarim el Ghani
    center: | 
      [![](https://img.shields.io/badge/License-CC%20BY--ND%204.0-lightgrey.svg)](https://creativecommons.org/licenses/by-nd/4.0/)
    right: |
      Build with [Quarto](https://quarto.org/)
    border: false
    
  # Add a reader mode button
  reader-mode: true
  
format:
  html:
    fontsize: 20px
    theme: cosmo
#      light:
#        - cosmo
#        - assets/akg-theme-light.scss
#      dark: 
#        - cosmo
#        - assets/akg-theme-dark.scss
    css: styles.css
    toc: true
    highlight-style: github
    page-layout: full
#    pagetitle: "{{< meta title >}}"

execute:
  cache: false
  freeze: auto
  
editor: 
  render-on-save: true



